<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Donaciones de Solly</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;
  --card:#151820;
  --card2:#1c2030;
  --accent:#f0c060;
  --accent2:#e07040;
  --green:#4ecdc4;
  --text:#e8e4dc;
  --muted:#7a8099;
  --border:#252a3a;
  --radius:18px;
  --shadow:0 8px 40px rgba(0,0,0,0.4);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.bg-glow{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);opacity:0.18}
.bg-glow.a{width:500px;height:500px;top:-100px;right:-100px;background:radial-gradient(circle,rgba(240,192,96,0.07),transparent 70%)}
.bg-glow.b{width:400px;height:400px;bottom:-80px;left:-80px;background:radial-gradient(circle,rgba(78,205,196,0.06),transparent 70%)}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px 80px}

header{text-align:center;margin-bottom:48px;animation:up .7s ease both}
.badge{display:inline-block;background:rgba(240,192,96,0.12);border:1px solid rgba(240,192,96,0.3);color:var(--accent);font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:99px;margin-bottom:18px}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;line-height:1.2;margin-bottom:10px}
header h1 span{color:var(--accent)}
header p{color:var(--muted);font-size:.95rem;font-weight:300}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;animation:up .7s .1s ease both}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px;text-align:center}
.stat-card .val{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--accent);margin-bottom:4px}
.stat-card .lbl{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}

.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:28px;animation:up .7s .2s ease both}
.form-card h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:22px;color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:.82rem;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
input,textarea,select{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--card2)}
.btn-submit{grid-column:1/-1;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0f00;font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;padding:14px;border:none;border-radius:12px;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:4px}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.msg{grid-column:1/-1;padding:12px 16px;border-radius:10px;font-size:.9rem;font-weight:600;display:none}
.msg.ok{background:rgba(78,205,196,.15);border:1px solid rgba(78,205,196,.3);color:var(--green);display:block}
.msg.err{background:rgba(224,112,64,.15);border:1px solid rgba(224,112,64,.3);color:var(--accent2);display:block}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;animation:up .7s .3s ease both}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.chart-card h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:16px;color:var(--text)}
.chart-wrap{position:relative;height:200px}

.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;animation:up .7s .4s ease both}
.table-card h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:18px;color:var(--text)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-size:.75rem;font-weight:700;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:12px;border-bottom:1px solid rgba(37,42,58,.6);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:700}
.tag.paypal{background:rgba(0,112,186,.2);color:#5ab4f0}
.tag.transfer{background:rgba(78,205,196,.15);color:var(--green)}
.tag.cash{background:rgba(240,192,96,.15);color:var(--accent)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:.9rem}

@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .charts-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="bg-glow a"></div>
<div class="bg-glow b"></div>
<div class="wrap">

  <header>
    <div class="badge">✦ Donaciones Personales</div>
    <h1>Apoya a <span>Solly</span></h1>
    <p>Cada donación queda registrada y es de gran ayuda 🙏</p>
  </header>

  <!-- Estadísticas -->
  <div class="stats">
    <div class="stat-card">
      <div class="val" id="statTotal">$0</div>
      <div class="lbl">Total Recibido</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statCount">0</div>
      <div class="lbl">Donaciones</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statAvg">$0</div>
      <div class="lbl">Promedio</div>
    </div>
  </div>

  <!-- Formulario -->
  <div class="form-card">
    <h2>✦ Nueva Donación</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre del Donante</label>
        <input type="text" id="fName" placeholder="Ej: María García" />
      </div>
      <div class="form-group">
        <label>Monto (USD)</label>
        <input type="number" id="fAmount" placeholder="0.00" min="1" step="0.01"/>
      </div>
      <div class="form-group">
        <label>Método de Pago</label>
        <select id="fMethod">
          <option value="PayPal">PayPal</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fDate"/>
      </div>
      <div class="form-group full">
        <label>Descripción / Mensaje</label>
        <textarea id="fDesc" placeholder="Escribe un mensaje o motivo de la donación..."></textarea>
      </div>
      <div class="msg" id="formMsg"></div>
      <button class="btn-submit" onclick="submitDonation()">✦ Registrar Donación</button>
    </div>
  </div>

  <!-- Gráficos -->
  <div class="charts-row">
    <div class="chart-card">
      <h3>Donaciones por Mes</h3>
      <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Por Método de Pago</h3>
      <div class="chart-wrap"><canvas id="chartPie"></canvas></div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="table-card">
    <h3>Historial de Donaciones</h3>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Donante</th>
            <th>Monto</th>
            <th>Método</th>
            <th>Descripción</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="donationTable">
          <tr><td colspan="5" class="empty">Cargando donaciones...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ============================================================
// 🔧 CONFIGURACIÓN — Reemplaza con tus datos de Supabase
// ============================================================
const SUPABASE_URL = 'TU_SUPABASE_URL'; // ej: https://abcdef.supabase.co
const SUPABASE_KEY = 'TU_SUPABASE_KEY'; // tu anon public key
const TABLE = 'donations';
// ============================================================

let donations = [];
let barChart, pieChart;

document.getElementById('fDate').value = new Date().toISOString().split('T')[0];

async function fetchDonations() {
  if (SUPABASE_URL.includes('TU_')) {
    donations = [];
    renderAll();
    return;
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    donations = await res.json();
    renderAll();
  } catch(e) {
    console.error('Error cargando donaciones:', e);
  }
}

async function submitDonation() {
  const name   = document.getElementById('fName').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const method = document.getElementById('fMethod').value;
  const desc   = document.getElementById('fDesc').value.trim();
  const date   = document.getElementById('fDate').value;
  const msg    = document.getElementById('formMsg');

  if (!name || !amount || amount <= 0) {
    msg.className = 'msg err';
    msg.textContent = '⚠️ Por favor completa el nombre y el monto correctamente.';
    return;
  }

  const row = { donor_name: name, amount, method, description: desc, created_at: date };

  if (SUPABASE_URL.includes('TU_')) {
    donations.unshift({...row, id: Date.now()});
    renderAll();
    msg.className = 'msg ok';
    msg.textContent = '✅ Donación registrada (modo demo). Conecta Supabase para guardar en la base de datos.';
    clearForm();
    return;
  }

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(row)
    });
    if (!res.ok) throw new Error('Error al guardar');
    msg.className = 'msg ok';
    msg.textContent = '✅ ¡Donación registrada exitosamente en Supabase!';
    clearForm();
    fetchDonations();
  } catch(e) {
    msg.className = 'msg err';
    msg.textContent = '❌ Error al guardar. Verifica tu configuración de Supabase.';
  }
}

function clearForm() {
  ['fName','fAmount','fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
}

function renderAll() {
  renderStats();
  renderTable();
  renderCharts();
}

function renderStats() {
  const total = donations.reduce((s,d) => s + Number(d.amount), 0);
  const count = donations.length;
  const avg   = count ? total / count : 0;
  document.getElementById('statTotal').textContent = '$' + total.toLocaleString('es', {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById('statCount').textContent = count;
  document.getElementById('statAvg').textContent   = '$' + avg.toFixed(2);
}

function renderTable() {
  const tbody = document.getElementById('donationTable');
  if (!donations.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No hay donaciones aún. ¡Registra la primera!</td></tr>';
    return;
  }
  tbody.innerHTML = donations.map(d => {
    const tag  = d.method === 'PayPal' ? 'paypal' : d.method === 'Transferencia' ? 'transfer' : 'cash';
    const date = d.created_at ? d.created_at.split('T')[0] : '';
    return `<tr>
      <td><strong>${d.donor_name}</strong></td>
      <td style="color:var(--accent);font-weight:700">$${Number(d.amount).toFixed(2)}</td>
      <td><span class="tag ${tag}">${d.method}</span></td>
      <td style="color:var(--muted)">${d.description || '—'}</td>
      <td style="color:var(--muted)">${date}</td>
    </tr>`;
  }).join('');
}

function renderCharts() {
  // Gráfico de barras por mes
  const monthly = {};
  donations.forEach(d => {
    const month = (d.created_at || '').substring(0, 7);
    if (month) monthly[month] = (monthly[month] || 0) + Number(d.amount);
  });
  const months      = Object.keys(monthly).sort();
  const monthLabels = months.map(m => {
    const [y, mo] = m.split('-');
    return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo-1] + ' ' + y.slice(2);
  });

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('chartBar'), {
    type: 'bar',
    data: {
      labels: monthLabels.length ? monthLabels : ['Sin datos'],
      datasets: [{
        label: 'Total $',
        data: months.length ? months.map(m => monthly[m]) : [0],
        backgroundColor: 'rgba(240,192,96,0.7)',
        borderColor: '#f0c060',
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7a8099' }, grid: { color: '#252a3a' } },
        y: { ticks: { color: '#7a8099' }, grid: { color: '#252a3a' } }
      }
    }
  });

  // Gráfico de dona por método
  const methods = {};
  donations.forEach(d => methods[d.method] = (methods[d.method] || 0) + 1);
  const hasData = Object.keys(methods).length > 0;

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('chartPie'), {
    type: 'doughnut',
    data: {
      labels: hasData ? Object.keys(methods) : ['Sin datos'],
      datasets: [{
        data: hasData ? Object.values(methods) : [1],
        backgroundColor: hasData ? ['#0070ba','#4ecdc4','#f0c060','#e07040'] : ['#252a3a'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7a8099', font: { family: 'Nunito' } } }
      },
      cutout: '60%'
    }
  });
}

// Iniciar
fetchDonations();
</script>
</body>
</html>
